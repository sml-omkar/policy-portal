name: Deploy to policy-portal

on:
  push:
    tags:
       - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Run the commands on EC2
        uses: applyboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/policy-portal
            git pull origin main
            npm install --production
            pm2 restart policy-portal
  
    
